name: Release

# Builds the Windows installer and publishes it (plus latest.yml for auto-update)
# to a GitHub Release whenever a version tag like v1.2.0 is pushed.
# Also runnable manually from the Actions tab (Run workflow).
#
# Uses the auto-provided GITHUB_TOKEN — no personal access token to manage.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: |
          node scripts/test-discord-audio.js
          npx electron . --test

      - name: Build & publish installer
        run: npm run publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
