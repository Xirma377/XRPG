name: Release

# Builds the Windows installer and publishes it (plus latest.yml for auto-update)
# to a GitHub Release whenever a version tag like v1.2.0 is pushed.
# Also runnable manually from the Actions tab (Run workflow).
#
# Uses the auto-provided GITHUB_TOKEN — no personal access token to manage.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

# electron-builder downloads its own Electron dist for packaging, so we skip the
# `electron` npm package's postinstall binary download (not needed here, and a
# common point of failure on a fresh CI runner).
env:
  ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Versions
        run: node -v && npm -v

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run audio pipeline tests
        run: node scripts/test-discord-audio.js

      - name: Build & publish installer
        run: npm run publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
